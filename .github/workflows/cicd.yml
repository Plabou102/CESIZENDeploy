name: CI CESIZEN Deploy
run-name: ${{ github.event.client_payload.message || github.event.head_commit.message }}

on:
  push:
  pull_request:
  repository_dispatch:
    types: [api-updated, react-updated]

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - CESIZENReact
          - CESIZENAPI

    steps:
      - name: Clone React
        run: git clone https://github.com/Plabou102/CESIZENReact.git CESIZENReact

      - name: Clone API
        run: git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Plabou102/CESIZENAPI.git CESIZENAPI

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.project }}

      - name: Build
        run: npm run build --if-present
        working-directory: ${{ matrix.project }}

      - name: Lint
        run: npm run lint --if-present
        working-directory: ${{ matrix.project }}

      - name: Test
        run: npm test --if-present
        working-directory: ${{ matrix.project }}

      - name: Install Playwright browsers
        if: matrix.project == 'CESIZENReact'
        run: npx playwright install --with-deps
        working-directory: CESIZENReact

      - name: Run React E2E tests
        if: matrix.project == 'CESIZENReact'
        run: npm run test:e2e
        working-directory: CESIZENReact

      - name: Upload Playwright report
        if: always() && matrix.project == 'CESIZENReact'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: CESIZENReact/playwright-report
          retention-days: 30

  audit:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - CESIZENReact
          - CESIZENAPI

    steps:
      - name: Clone React
        run: git clone https://github.com/Plabou102/CESIZENReact.git CESIZENReact

      - name: Clone API
        run: git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Plabou102/CESIZENAPI.git CESIZENAPI

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.project }}

      - name: Security audit
        run: npm audit --audit-level=critical
        working-directory: ${{ matrix.project }}

  gitleaks:
    name: Gitleaks - Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: ${{ github.event_name == 'repository_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build-and-push-docker:
    name: Docker - Build and push images
    runs-on: ubuntu-latest
    needs: [build-lint-test, audit, gitleaks]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone API
        run: git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Plabou102/CESIZENAPI.git CESIZENAPI

      - name: Clone React
        run: git clone https://github.com/Plabou102/CESIZENReact.git CESIZENReact

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./CESIZENAPI
          push: true
          tags: ghcr.io/${{ env.OWNER }}/cesizen-api:main

      - name: Build and push React image
        uses: docker/build-push-action@v6
        with:
          context: ./CESIZENReact
          push: true
          tags: ghcr.io/${{ env.OWNER }}/cesizen-react:main

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: [build-and-push-docker]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VM
        run: |
          scp docker-compose.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/CESIZen/docker-compose.yml
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u plabou102 --password-stdin
            cd ~/CESIZen
            printf "CORS_ORIGIN=%s\nJWT_SECRET=%s\nDB_PASSWORD=%s\nSEED_PASSWORD=%s\n" \
              "${{ secrets.CORS_ORIGIN }}" \
              "${{ secrets.JWT_SECRET }}" \
              "${{ secrets.DB_PASSWORD }}" \
              "${{ secrets.SEED_PASSWORD }}" > .env
            docker compose up -d --pull always
          EOF