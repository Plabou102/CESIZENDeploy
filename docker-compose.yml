services:
  traefik:
    image: "traefik:v2.11"
    restart: unless-stopped
    container_name: "traefik"
    command:
      - "--log.level=DEBUG"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=adaimebou@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/home/azureuser/traefik/letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - web




  uptime-kuma:
      image: louislam/uptime-kuma:1
      container_name: uptime-kuma
      restart: unless-stopped
      volumes:
        - uptime_kuma_data:/app/data
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.cesizen-api.rule=Host(`cesizenadame.duckdns.org`) && PathPrefix(`/api`)"
        - "traefik.http.routers.cesizen-api.entrypoints=websecure"
        - "traefik.http.routers.cesizen-api.tls.certresolver=myresolver"
        - "traefik.http.middlewares.cesizen-api-strip.stripprefix.prefixes=/api"
        - "traefik.http.routers.cesizen-api.middlewares=cesizen-api-strip"
        - "traefik.http.services.cesizen-api.loadbalancer.server.port=3001"
      networks:
        - web

  db:
    image: postgres:16
    container_name: cesizen-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cesizen}
      POSTGRES_USER: cesizen
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cesizen}
    volumes:
      - cesizen_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cesizen"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - web

  api:
    image: ghcr.io/plabou102/cesizen-api:main
    container_name: cesizen-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cesizen:${DB_PASSWORD:-cesizen}@db:5432/${POSTGRES_DB:-cesizen}
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET}
      SEED_PASSWORD: ${SEED_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cesizen-api.rule=Host(`cesizenadame.duckdns.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.cesizen-api.entrypoints=websecure"
      - "traefik.http.routers.cesizen-api.tls.certresolver=myresolver"
      - "traefik.http.services.cesizen-api.loadbalancer.server.port=3001"
    networks:
      - web

  frontend:
    image: ghcr.io/plabou102/cesizen-react:main
    container_name: cesizen-react
    restart: unless-stopped
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cesizen-frontend.rule=Host(`cesizenadame.duckdns.org`)"
      - "traefik.http.routers.cesizen-frontend.entrypoints=websecure"
      - "traefik.http.routers.cesizen-frontend.tls.certresolver=myresolver"
      - "traefik.http.services.cesizen-frontend.loadbalancer.server.port=5173"
    networks:
      - web

volumes:
  cesizen_pgdata:
  uptime_kuma_data:

networks:
  web:
    name: web